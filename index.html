<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bear Foot Pressure Washing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grid-bg"></div> <!-- Grid background -->

  <div class="container">
    <!-- Glass panel with company name -->
    <div class="glass-card">
      <h1 class="company-name">Bear Foot Pressure Washing</h1>
      <a href="https://instagram.com/@bearfootexterior" target="_blank" class="ig-link">Instagram</a>
    </div>

    <!-- Center 3D wand -->
    <div class="wand">
      <img src="wand.png" alt="Pressure Washing Wand">
    </div>

    <!-- Animated water/liquid blobs -->
    <div class="blob green"></div>
    <div class="blob brown"></div>
    <div class="blob lighter-green"></div>
    <div class="blob accent"></div>
    <div class="blob accent2"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
